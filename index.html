<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <title>To Do List</title>
</head>
<body>
    <div class="main-box">
        <div class="buttons">
            <button class="btn1 theme-btns" data-theme="orange-theme"></button>
            <button class="btn2 theme-btns" data-theme="minmalist-theme"></button>
            <button class="btn3 theme-btns" data-theme="dark-theme"></button>
        </div>

        <p class="heading">Today</p>

        <div class="input-add-section">
            <input type="text" class="list-input" placeholder="enter your task...">
            <button class="add-btn">ADD</button>
        </div>

        <div class="dividing-line"></div>

        <ul class="todo-list">

            <p class = "default-text"> No tasks yet </p>`

            <!--

                <p class="tasks">
                    Lorem ipsum dolor sit amet.
                </p>
                <button class="delete-btn"></button>
            </li>
        -->
            
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
